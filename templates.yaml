  - sensor:
    - name: "Basement Temperature Alexa"
      unit_of_measurement: '°F'
      state: "{{ states('sensor.airthings_wave_090595_temperature') | round(0) }}"
    - name: "Bedroom Temperature Alexa"
      unit_of_measurement: '°F'
      state: "{{ states('sensor.master_bedroom_temperature') | round(0) }}"
    - name: "Garage Temperature Alexa"
      unit_of_measurement: '°F'
      state: "{{ states('sensor.sht30_05_temperature') | round(0) }}"
    - name: "Guest Room Temperature Alexa"
      unit_of_measurement: '°F'
      state: "{{ states('sensor.sht30_01_temperature') | round(0) }}"
    - name: "Guest Suite Temperature Alexa"
      unit_of_measurement: '°F'
      state: "{{ states('sensor.guest_suite_current_temperature') | round(0) }}"
    - name: "Living Room Temperature Alexa"
      unit_of_measurement: '°F'
      state: "{{ states('sensor.living_room_temperature') | round(0) }}"
    # - name: "Kitchen Temperature Alexa"
    #   unit_of_measurement: '°F'
    #   state: "{{ states('sensor.sht30_07_temperature') | round(0) }}"
    - name: "Peters Room Temperature Alexa"
      unit_of_measurement: '°F'
      state: "{{ states('sensor.peters_room_temperature') | round(0) }}"
    - name: "Shannons Room Temperature Alexa"
      unit_of_measurement: '°F'
      state: "{{ states('sensor.shannons_room_temperature') | round(0) }}"
    - name: "Office Temperature Alexa"
      unit_of_measurement: '°F'
      state: "{{ states('sensor.office_temperature') | round(0) }}"

  ##For Washer/Dryer Status Cards
    - name: "Washer Door Lock"
      state: "{{ state_attr('sensor.washer','door_lock') }}"
    - name: "Washer Time Display"
      state: >
       {% if is_state('sensor.washer_run_state', '-') %}
       {% elif is_state('sensor.washer_run_state', 'unavailable') %}
       {% elif is_state('sensor.washer_run_state', 'Standby') %}
         -:--
       {% else %}
         {{ state_attr("sensor.washer","remain_time").split(":")[:-1] | join(':') }}   
       {% endif %}
    - name: "Dryer Time Display"
      state: >
       {% if is_state('sensor.dryer_run_state', '-') %}
       {% elif is_state('sensor.dryer_run_state', 'unavailable') %}
       {% elif is_state('sensor.dryer_run_state', 'Standby') %}
         -:--
       {% else %}
         {{ state_attr("sensor.dryer","remain_time").split(":")[:-1] | join(':') }}
       {% endif %}
    - name: "Blank Sensor"
      state: ""

    - name: ApCo Electricity Usage
      unit_of_measurement: kWh
      device_class: energy
      default_entity_id: sensor.apco_electricity_usage
      state: '{{ 0 }}'
      state_class: total_increasing

  - triggers:
      - trigger: time_pattern
        minutes: "/10"
      - trigger: homeassistant
        event: start
      - trigger: event
        event_type: event_template_reloaded
      - trigger: event
        event_type: call_service
        event_data:
          domain: homeassistant
          service: update_entity
          service_data:
            entity_id:
              - sensor.actual_budget #update this if you rename the sensor
    actions:
      - action: rest_command.actual_get_budgets
        response_variable: budget_resp
      - variables:
          budget_file_name: "My Finances" #update this if you use multiple budget files
          sync_id: >
            {% if budget_resp is mapping and 'content' in budget_resp %}
              {% set data = budget_resp['content'].get('data', []) %}
              {% set budgets = data | selectattr('state', 'eq', 'remote') | list %}
              {% set count = budgets | count %}
              {% if count == 1 %}
                {{ budgets[0].get('groupId', 'unknown') }}
              {% elif count > 1 %}
                {{ (budgets | selectattr('name', 'eq', budget_file_name) | map(attribute='groupId') | first) | default('unknown') }}
              {% else %}
              unknown
              {% endif %}
            {% else %}
            unknown
            {% endif %}
      - condition: template
        value_template: "{{ sync_id != 'unknown' }}"
      - action: rest_command.actual_get_groups
        data:
          sync_id: "{{ sync_id }}"
          month: "{{ now().strftime('%Y-%m') }}"
        response_variable: groups_response
      - action: rest_command.actual_get_uncategorized
        data:
          sync_id: "{{ sync_id }}"
        response_variable: uncategorized_response
      - action: rest_command.actual_get_transactions
        data:
          sync_id: "{{ sync_id }}"
        response_variable: transactions_response
      - action: rest_command.actual_get_accounts
        data:
          sync_id: "{{ sync_id }}"
        response_variable: accounts_response
    sensor:
      - name: Actual Budget
        unique_id: actual_budget_current_month
        unit_of_measurement: "Uncategorized"
        icon: mdi:cash-sync
        state: >
          {{ uncategorized_response.get('content', {}).get('data', -1) }}
        attributes:
          sync_id: "{{ sync_id }}"
          accounts: >
            {{ accounts_response.get('content', {}).get('data', []) }}
          groups: >
            {{ groups_response.get('content', {}).get('data', []) }}
          transactions: >
            {{ transactions_response.get('content', {}).get('data', []) }}
          overbudget: >
            {{
              groups_response.get('content', {}).get('data', []) | 
              map(attribute='categories') | sum(start=[]) | 
              selectattr('balance', 'defined') | 
              selectattr('balance', 'lt', 0) | 
              list
            }}